<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘哥密语工坊</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-1: #07111f;
            --bg-2: #102545;
            --panel: rgba(10, 19, 36, 0.72);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text-main: #ecf3ff;
            --text-soft: #99acd4;
            --primary: #62a5ff;
            --primary-strong: #3a7dff;
            --secondary: #7df9d0;
            --warning: #ffc978;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top, rgba(98, 165, 255, 0.22), transparent 35%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 55%, #08101b);
            overflow-x: hidden;
        }

        #particleCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.8;
        }

        .cursor-glow {
            position: fixed;
            left: 0;
            top: 0;
            width: 340px;
            height: 340px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transform: translate3d(-50%, -50%, 0);
            background: radial-gradient(circle, rgba(98, 165, 255, 0.22), rgba(98, 165, 255, 0.04) 45%, transparent 70%);
            filter: blur(12px);
            transition: opacity 0.28s ease;
        }

        .cursor-glow.secondary {
            width: 240px;
            height: 240px;
            background: radial-gradient(circle, rgba(125, 249, 208, 0.18), rgba(125, 249, 208, 0.04) 45%, transparent 72%);
            filter: blur(8px);
        }

        .page-shell {
            position: relative;
            z-index: 1;
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 48px 0 40px;
            isolation: isolate;
        }

        .workspace-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(18px);
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            animation: cardEntrance 0.82s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .button-container button {
            border: 0;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease, background 0.22s ease;
            font-weight: 600;
        }

        .workspace-card {
            padding: 28px;
            animation-delay: 0.18s;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .toolbar h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .toolbar p {
            margin: 6px 0 0;
            color: var(--text-soft);
            font-size: 0.95rem;
        }

        .editor-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .key-panel {
            margin-bottom: 18px;
        }

        .panel {
            padding: 18px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 0;
            transform: translateY(22px);
            animation: fadeRise 0.75s ease forwards;
        }

        .panel:nth-child(1) {
            animation-delay: 0.34s;
        }

        .panel:nth-child(2) {
            animation-delay: 0.42s;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .panel-header label {
            font-size: 1rem;
            font-weight: 600;
        }

        .panel-header span {
            color: var(--text-soft);
            font-size: 0.92rem;
        }

        textarea {
            width: 100%;
            min-height: 240px;
            padding: 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(6, 12, 24, 0.72);
            color: var(--text-main);
            font: inherit;
            line-height: 1.7;
            resize: vertical;
            outline: none;
            white-space: pre-wrap;
            transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
        }

        textarea:focus {
            border-color: rgba(98, 165, 255, 0.85);
            box-shadow: 0 0 0 4px rgba(98, 165, 255, 0.14);
            transform: translateY(-1px);
        }

        textarea::placeholder {
            color: rgba(236, 243, 255, 0.4);
        }

        .key-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(6, 12, 24, 0.72);
            color: var(--text-main);
            font: inherit;
            outline: none;
            transition: border-color 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
        }

        .key-input:focus {
            border-color: rgba(98, 165, 255, 0.85);
            box-shadow: 0 0 0 4px rgba(98, 165, 255, 0.14);
            transform: translateY(-1px);
        }

        .key-input::placeholder {
            color: rgba(236, 243, 255, 0.4);
        }

        .key-note {
            margin: 10px 0 0;
            color: var(--text-soft);
            font-size: 0.92rem;
            line-height: 1.65;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 12px;
            margin: 18px 0;
        }

        .button-container button {
            padding: 14px 16px;
            color: #fff;
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.18);
        }

        .button-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(0, 0, 0, 0.22);
        }

        .encrypt-button {
            background: linear-gradient(135deg, #3b82f6, #2454ff);
        }

        .decrypt-button {
            background: linear-gradient(135deg, #14b8a6, #1d9c84);
        }

        .copy-button {
            background: linear-gradient(135deg, #7c6df3, #5f4be0);
        }

        .swap-button {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
        }

        .clear-button {
            background: linear-gradient(135deg, #ef4444, #d946ef);
        }

        .status-bar,
        .quick-info {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .info-card {
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            opacity: 0;
            transform: translateY(18px);
            animation: fadeRise 0.72s ease forwards;
        }

        .status-bar .info-card:nth-child(1) {
            animation-delay: 0.22s;
        }

        .status-bar .info-card:nth-child(2) {
            animation-delay: 0.3s;
        }

        .status-bar .info-card:nth-child(3) {
            animation-delay: 0.38s;
        }

        .info-card strong,
        .info-card span {
            display: block;
        }

        .info-card strong {
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .info-card span {
            color: var(--text-soft);
            font-size: 0.92rem;
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            min-width: 220px;
            max-width: min(420px, calc(100vw - 40px));
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(8, 14, 26, 0.9);
            color: #fff;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            z-index: 2;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            border-color: rgba(125, 249, 208, 0.35);
        }

        .toast.error {
            border-color: rgba(255, 120, 120, 0.35);
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeRise {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .editor-grid,
            .status-bar,
            .quick-info {
                grid-template-columns: 1fr;
            }

            .button-container {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .button-container button:last-child {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 540px) {
            .page-shell {
                width: min(100% - 16px, 1120px);
            }

            .button-container button {
                min-height: 48px;
            }

            .toolbar {
                gap: 12px;
            }
        }

        @media (max-width: 640px) {
            .page-shell {
                width: min(100% - 20px, 1120px);
                padding-top: 20px;
            }

            .workspace-card {
                border-radius: 22px;
                padding: 20px;
            }

            .button-container {
                grid-template-columns: 1fr;
            }

            textarea {
                min-height: 200px;
            }
        }

        @media (max-width: 480px) {
            body {
                background:
                    radial-gradient(circle at top, rgba(98, 165, 255, 0.18), transparent 32%),
                    linear-gradient(180deg, var(--bg-1), var(--bg-2) 58%, #08101b);
            }

            .cursor-glow {
                display: none;
            }

            .page-shell {
                padding-bottom: 20px;
            }

            .info-card span,
            .toolbar p {
                font-size: 0.92rem;
                line-height: 1.65;
            }

            .workspace-card,
            .panel {
                padding: 16px;
                border-radius: 20px;
            }

            .button-container button {
                width: 100%;
                justify-content: center;
                font-size: 0.95rem;
                padding: 13px 14px;
            }

            textarea {
                min-height: 170px;
                padding: 15px;
                border-radius: 16px;
            }

            .panel-header {
                align-items: flex-start;
                flex-direction: column;
                gap: 6px;
            }

            .toast {
                left: 12px;
                right: 12px;
                bottom: 12px;
                max-width: none;
                min-width: 0;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .workspace-card,
            .panel,
            .info-card,
            .button-container button,
            textarea,
            .toast,
            .cursor-glow {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas" aria-hidden="true"></canvas>
    <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>
    <div class="cursor-glow secondary" id="cursorGlowSecondary" aria-hidden="true"></div>
    <main class="page-shell">
        <section class="workspace-card" id="workspace">
            <div class="toolbar">
                <div>
                    <h2>开始转换</h2>
                    <p>支持快捷键：Ctrl/Cmd + Enter 快速加密，Ctrl/Cmd + Shift + Enter 快速解密。</p>
                </div>
            </div>

            <div class="panel key-panel">
                <div class="panel-header">
                    <label for="keyBox">加密密钥</label>
                    <span id="keyMeta">32 / 32 字符</span>
                </div>
                <input id="keyBox" class="key-input" type="text" placeholder="请输入 32 个互不重复的字符作为密钥。" autocomplete="off" spellcheck="false">
                <p class="key-note">密钥会保存在当前浏览器中，加密和解密都将使用这组 32 个不重复字符。</p>
            </div>

            <div class="editor-grid">
                <div class="panel">
                    <div class="panel-header">
                        <label for="inputBox">输入区</label>
                        <span id="inputMeta">0 个字符</span>
                    </div>
                    <textarea id="inputBox" class="input-box" placeholder="输入需要加密的原文，或者输入密文进行解密。"></textarea>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <label for="outputBox">结果区</label>
                        <span id="outputMeta">0 个字符</span>
                    </div>
                    <textarea id="outputBox" class="output-box" placeholder="这里会显示转换结果。" readonly></textarea>
                </div>
            </div>

            <div class="button-container">
                <button class="encrypt-button" type="button" onclick="encryptText()">加密</button>
                <button class="decrypt-button" type="button" onclick="decryptText()">解密</button>
                <button class="copy-button" type="button" onclick="copyText()">复制结果</button>
                <button class="swap-button" type="button" onclick="useOutputAsInput()">结果回填</button>
                <button class="clear-button" type="button" onclick="clearAll()">清空内容</button>
            </div>

            <div class="status-bar">
                <div class="info-card">
                    <strong id="modeLabel">等待操作</strong>
                    <span>根据你的输入执行加密或解密。</span>
                </div>
                <div class="info-card">
                    <strong id="binaryHint">0 bit</strong>
                    <span>当前输入换算后的二进制位数提示。</span>
                </div>
                <div class="info-card">
                    <strong id="storageHint">草稿未保存</strong>
                    <span>输入和密钥会自动保存在当前浏览器。</span>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        const defaultCipherKey = "这就是我们的刘哥汉堡炸鸡配可乐放学时间消狂拽酷炫小让对手蒙圈拜服";
        const KEY_LENGTH = 32;
        const draftStorageKey = "cipher-tool-draft";
        const cipherKeyStorageKey = "cipher-tool-key";
        const PARTICLE_COMPACT_BREAKPOINT = 900;
        const MOBILE_PARTICLE_COUNT = 28;
        const DESKTOP_PARTICLE_COUNT = 48;
        const MIN_PARTICLE_SIZE = 1;
        const PARTICLE_SIZE_RANGE = 2.6;
        const PARTICLE_SPEED_RANGE = 0.35;
        const MIN_PARTICLE_ALPHA = 0.18;
        const PARTICLE_ALPHA_RANGE = 0.55;
        const PRIMARY_GLOW_OFFSET = 170;
        const SECONDARY_GLOW_OFFSET = 120;
        const inputBox = document.getElementById("inputBox");
        const outputBox = document.getElementById("outputBox");
        const keyBox = document.getElementById("keyBox");
        const toast = document.getElementById("toast");
        const keyMeta = document.getElementById("keyMeta");
        const inputMeta = document.getElementById("inputMeta");
        const outputMeta = document.getElementById("outputMeta");
        const modeLabel = document.getElementById("modeLabel");
        const binaryHint = document.getElementById("binaryHint");
        const storageHint = document.getElementById("storageHint");
        const cursorGlow = document.getElementById("cursorGlow");
        const cursorGlowSecondary = document.getElementById("cursorGlowSecondary");
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

        let toastTimer;

        function showToast(message, type) {
            toast.textContent = message;
            toast.className = "toast show " + (type || "");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(function() {
                toast.className = "toast " + (type || "");
            }, 2200);
        }

        function updateStats() {
            const cipherKey = keyBox.value;
            const currentKeyLength = Array.from(cipherKey).length;

            if (isValidCipherKey(cipherKey)) {
                keyMeta.textContent = currentKeyLength + " / " + KEY_LENGTH + " 字符 · 密钥可用";
                keyBox.removeAttribute("aria-invalid");
            } else {
                keyMeta.textContent = currentKeyLength + " / " + KEY_LENGTH + " 字符 · 需要 " + KEY_LENGTH + " 个不重复字符";
                keyBox.setAttribute("aria-invalid", "true");
            }

            inputMeta.textContent = inputBox.value.length + " 个字符";
            outputMeta.textContent = outputBox.value.length + " 个字符";
            binaryHint.textContent = calculateBinaryHint(inputBox.value) + " bit";
        }

        function isEncryptedText(text) {
            const cipherKey = getCipherKey();
            if (!cipherKey) {
                return false;
            }

            return text && Array.from(text).every(function(character) {
                return cipherKey.indexOf(character) !== -1;
            });
        }

        function calculateBinaryHint(text) {
            if (!text) {
                return 0;
            }
            return text.length * (isEncryptedText(text) ? 5 : 16);
        }

        function isValidCipherKey(cipherKey) {
            const characters = Array.from(cipherKey);
            return characters.length === KEY_LENGTH && new Set(characters).size === characters.length;
        }

        function getCipherKey() {
            return isValidCipherKey(keyBox.value) ? keyBox.value : null;
        }

        function getCipherKeyOrShowError() {
            const cipherKey = getCipherKey();
            if (!cipherKey) {
                showToast("请先填写 " + KEY_LENGTH + " 个互不重复的密钥字符。", "error");
                keyBox.focus();
                return null;
            }
            return cipherKey;
        }

        function saveDraft() {
            localStorage.setItem(draftStorageKey, inputBox.value);
            storageHint.textContent = inputBox.value ? "草稿已自动保存" : "草稿已清空";
        }

        function saveCipherKey() {
            localStorage.setItem(cipherKeyStorageKey, keyBox.value);
        }

        function restoreDraft() {
            const draft = localStorage.getItem(draftStorageKey);
            if (draft) {
                inputBox.value = draft;
                storageHint.textContent = "已恢复上次草稿";
            }
            updateStats();
        }

        function restoreCipherKey() {
            const storedCipherKey = localStorage.getItem(cipherKeyStorageKey);
            if (storedCipherKey && isValidCipherKey(storedCipherKey)) {
                keyBox.value = storedCipherKey;
            } else {
                keyBox.value = defaultCipherKey;
                if (storedCipherKey) {
                    localStorage.removeItem(cipherKeyStorageKey);
                }
            }
            updateStats();
        }

        function encryptText() {
            const inputText = inputBox.value;
            if (!inputText) {
                showToast("请先输入要加密的内容。", "error");
                return;
            }
            const cipherKey = getCipherKeyOrShowError();
            if (!cipherKey) {
                return;
            }

            let binaryString = "";
            for (let i = 0; i < inputText.length; i++) {
                const charCode = inputText.charCodeAt(i);
                binaryString += charCode.toString(2).padStart(16, "0");
            }

            while (binaryString.length % 5 !== 0) {
                binaryString += "0";
            }

            let resultText = "";
            for (let i = 0; i < binaryString.length; i += 5) {
                const binaryGroup = binaryString.substring(i, i + 5);
                const decimalValue = parseInt(binaryGroup, 2);
                if (decimalValue >= 0 && decimalValue < cipherKey.length) {
                    resultText += cipherKey[decimalValue];
                } else {
                    showToast("加密失败，生成的二进制数超出密钥字符范围。", "error");
                    return;
                }
            }

            outputBox.value = resultText;
            modeLabel.textContent = "已完成加密";
            updateStats();
            showToast("加密成功，结果已生成。", "success");
        }

        function decryptText() {
            const encryptedText = inputBox.value;
            if (!encryptedText) {
                showToast("请先输入要解密的密文。", "error");
                return;
            }
            const cipherKey = getCipherKeyOrShowError();
            if (!cipherKey) {
                return;
            }

            let binaryString = "";
            for (let i = 0; i < encryptedText.length; i++) {
                const charIndex = cipherKey.indexOf(encryptedText[i]);
                if (charIndex === -1) {
                    showToast("解密失败，输入内容包含当前密钥外的字符。", "error");
                    return;
                }
                binaryString += charIndex.toString(2).padStart(5, "0");
            }

            while (binaryString.length % 16 !== 0) {
                binaryString = binaryString.slice(0, -1);
            }

            let resultText = "";
            for (let i = 0; i < binaryString.length; i += 16) {
                const binaryGroup = binaryString.substring(i, i + 16);
                const decimalValue = parseInt(binaryGroup, 2);
                if (decimalValue >= 0 && decimalValue <= 65535) {
                    resultText += String.fromCharCode(decimalValue);
                } else {
                    showToast("解密失败，生成的二进制数超出字符范围。", "error");
                    return;
                }
            }

            outputBox.value = resultText;
            modeLabel.textContent = "已完成解密";
            updateStats();
            showToast("解密成功，内容已还原。", "success");
        }

        async function copyText() {
            const outputText = outputBox.value;
            if (!outputText) {
                showToast("输出框中没有内容可复制。", "error");
                return;
            }

            try {
                await navigator.clipboard.writeText(outputText);
                showToast("结果已复制到剪贴板。", "success");
            } catch (error) {
                try {
                    outputBox.readOnly = false;
                    outputBox.select();
                    const copied = document.execCommand("copy");

                    if (copied) {
                        showToast("结果已复制到剪贴板。", "success");
                    } else {
                        showToast("复制失败，请手动复制结果。", "error");
                    }
                } catch (fallbackError) {
                    showToast("复制失败，请手动复制结果。", "error");
                    console.error("复制失败，回退方案也失败了: ", fallbackError);
                } finally {
                    outputBox.readOnly = true;
                }
                console.error("复制失败，已尝试回退方案: ", error);
            }
        }

        function useOutputAsInput() {
            if (!outputBox.value) {
                showToast("当前没有结果可回填。", "error");
                return;
            }
            inputBox.value = outputBox.value;
            outputBox.value = "";
            modeLabel.textContent = "结果已回填";
            saveDraft();
            updateStats();
            inputBox.focus();
            showToast("结果已回填到输入区。", "success");
        }

        function clearAll() {
            inputBox.value = "";
            outputBox.value = "";
            modeLabel.textContent = "内容已清空";
            saveDraft();
            updateStats();
            showToast("输入与输出内容已清空。", "success");
        }

        inputBox.addEventListener("input", function() {
            saveDraft();
            updateStats();
            modeLabel.textContent = "等待操作";
        });

        keyBox.addEventListener("input", function() {
            saveCipherKey();
            updateStats();
        });

        inputBox.addEventListener("keydown", function(event) {
            const hasPrimaryModifier = event.ctrlKey || event.metaKey;

            if (hasPrimaryModifier && event.shiftKey && event.key === "Enter") {
                event.preventDefault();
                decryptText();
                return;
            }

            if (hasPrimaryModifier && event.key === "Enter") {
                event.preventDefault();
                encryptText();
            }
        });

        function setupCursorGlow() {
            if (prefersReducedMotion.matches) {
                return;
            }

            document.addEventListener("pointermove", function(event) {
                cursorGlow.style.opacity = "1";
                cursorGlowSecondary.style.opacity = "1";
                cursorGlow.style.transform = "translate3d(" + (event.clientX - PRIMARY_GLOW_OFFSET) + "px, " + (event.clientY - PRIMARY_GLOW_OFFSET) + "px, 0)";
                cursorGlowSecondary.style.transform = "translate3d(" + (event.clientX - SECONDARY_GLOW_OFFSET) + "px, " + (event.clientY - SECONDARY_GLOW_OFFSET) + "px, 0)";
            });

            document.addEventListener("pointerleave", function() {
                cursorGlow.style.opacity = "0";
                cursorGlowSecondary.style.opacity = "0";
            });
        }

        function setupParticles() {
            const canvas = document.getElementById("particleCanvas");
            const ctx = canvas.getContext("2d");
            const particles = [];
            const PARTICLE_LINK_DISTANCE = 150;
            const LINK_OPACITY_FACTOR = 0.2;
            let particleCount = window.innerWidth < PARTICLE_COMPACT_BREAKPOINT ? MOBILE_PARTICLE_COUNT : DESKTOP_PARTICLE_COUNT;
            let resizeFrame = null;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createParticles() {
                particleCount = window.innerWidth < PARTICLE_COMPACT_BREAKPOINT ? MOBILE_PARTICLE_COUNT : DESKTOP_PARTICLE_COUNT;
                particles.length = 0;
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * PARTICLE_SIZE_RANGE + MIN_PARTICLE_SIZE,
                        speedX: (Math.random() - 0.5) * PARTICLE_SPEED_RANGE,
                        speedY: (Math.random() - 0.5) * PARTICLE_SPEED_RANGE,
                        alpha: Math.random() * PARTICLE_ALPHA_RANGE + MIN_PARTICLE_ALPHA
                    });
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(function(particle, index) {
                    particle.x += particle.speedX;
                    particle.y += particle.speedY;

                    if (particle.x < 0 || particle.x > canvas.width) {
                        particle.speedX *= -1;
                        particle.x = Math.max(0, Math.min(canvas.width, particle.x));
                    }
                    if (particle.y < 0 || particle.y > canvas.height) {
                        particle.speedY *= -1;
                        particle.y = Math.max(0, Math.min(canvas.height, particle.y));
                    }

                    ctx.beginPath();
                    ctx.fillStyle = "rgba(125, 249, 208, " + particle.alpha + ")";
                    ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                    ctx.fill();

                    for (let j = index + 1; j < particles.length; j++) {
                        const neighbor = particles[j];
                        const dx = particle.x - neighbor.x;
                        const dy = particle.y - neighbor.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < PARTICLE_LINK_DISTANCE) {
                            const lineOpacity = (1 - distance / PARTICLE_LINK_DISTANCE) * LINK_OPACITY_FACTOR;
                            ctx.beginPath();
                            ctx.strokeStyle = "rgba(98, 165, 255, " + lineOpacity + ")";
                            ctx.lineWidth = 1;
                            ctx.moveTo(particle.x, particle.y);
                            ctx.lineTo(neighbor.x, neighbor.y);
                            ctx.stroke();
                        }
                    }
                });

                requestAnimationFrame(drawParticles);
            }

            resizeCanvas();
            createParticles();
            drawParticles();

            window.addEventListener("resize", function() {
                if (resizeFrame) {
                    cancelAnimationFrame(resizeFrame);
                }
                resizeFrame = requestAnimationFrame(function() {
                    resizeCanvas();
                    createParticles();
                });
            });
        }

        restoreCipherKey();
        restoreDraft();
        setupCursorGlow();
        setupParticles();
        updateStats();
    </script>
</body>
</html>
